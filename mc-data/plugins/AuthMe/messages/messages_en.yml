# List of global tags:
# %nl% - Goes to new line.
# %username% - Replaces the username of the player receiving the message.
# %displayname% - Replaces the nickname (and colors) of the player receiving the message.

# Registration
registration:
  register_request: '&3Por favor, registre-se no servidor com o comando: /register <senha> <ConfirmarSenha>'
  command_usage: '&cUso: /register <senha> <ConfirmarSenha>'
  reg_only: '&4Apenas usuários registrados podem entrar no servidor! Por favor, visite http://example.com para se registrar!'
  kicked_admin_registered: 'Um administrador acabou de registrar você; por favor, faça login novamente.'
  success: '&2Registrado com sucesso!'
  disabled: '&cO registro dentro do jogo está desativado!'
  name_taken: '&cVocê já registrou este nome de usuário!'

# Password errors on registration
password:
  match_error: '&cAs senhas não coincidem, verifique-as novamente!'
  name_in_password: '&cVocê não pode usar seu nome como senha, por favor escolha outra...'
  unsafe_password: '&cA senha escolhida não é segura, por favor escolha outra...'
  forbidden_characters: '&4Sua senha contém caracteres inválidos. Caracteres permitidos: %valid_chars'
  wrong_length: '&cSua senha é muito curta ou muito longa! Por favor, tente outra!'

# Login
login:
  command_usage: '&cUso: /login <senha>'
  wrong_password: '&cSenha incorreta!'
  success: '&2Login efetuado com sucesso!'
  login_request: '&cPor favor, faça login com o comando: /login <senha>'
  timeout_error: '&4O tempo de login expirou, você foi desconectado do servidor, por favor tente novamente!'

# Errors
error:
  unregistered_user: '&cEste usuário não está registrado!'
  denied_command: '&cPara usar este comando você precisa estar autenticado!'
  denied_chat: '&cPara usar o chat você precisa estar autenticado!'
  not_logged_in: '&cVocê não está logado!'
  tempban_max_logins: '&cVocê foi banido temporariamente por errar o login muitas vezes.'
  max_registration: '&cVocê excedeu o número máximo de registros (%reg_count/%max_acc %reg_names) para a sua conexão!'
  no_permission: '&4Você não tem permissão para realizar esta ação!'
  unexpected_error: '&4Ocorreu um erro inesperado, por favor contate um administrador!'
  kick_for_vip: '&3Um jogador VIP entrou no servidor quando ele estava cheio!'
  logged_in: '&cVocê já está logado!'
  kick_unresolved_hostname: '&cOcorreu um erro: hostname do jogador não resolvido!'

# AntiBot
antibot:
  kick_antibot: 'O modo de proteção AntiBot está ativado! Você precisa esperar alguns minutos antes de entrar no servidor.'
  auto_enabled: '&4[AntiBotService] AntiBot ativado devido ao grande número de conexões!'
  auto_disabled: '&2[AntiBotService] AntiBot desativado após %m minutos!'

unregister:
  success: '&cConta cancelada com sucesso!'
  command_usage: '&cUso: /unregister <senha>'

# Other messages
misc:
  accounts_owned_self: 'Você possui %count contas:'
  accounts_owned_other: 'O jogador %name possui %count contas:'
  account_not_activated: '&cSua conta ainda não está ativada, por favor verifique seus emails!'
  password_changed: '&2Senha alterada com sucesso!'
  logout: '&2Deslogado com sucesso!'
  reload: '&2As configurações e o banco de dados foram recarregados corretamente!'
  usage_change_password: '&cUso: /changepassword <SenhaAntiga> <NovaSenha>'

# Session messages
session:
  invalid_session: '&cSeu IP mudou e os dados da sua sessão expiraram!'
  valid_session: '&2Logado devido à Reconexão de Sessão.'

# Error messages when joining
on_join_validation:
  name_length: '&4Seu nome de usuário é muito curto ou muito longo!'
  characters_in_name: '&4Seu nome de usuário contém caracteres inválidos. Caracteres permitidos: %valid_chars'
  country_banned: '&4Seu país está banido deste servidor!'
  not_owner_error: 'Você não é o dono desta conta. Por favor escolha outro nome!'
  kick_full_server: '&4O servidor está cheio, tente novamente mais tarde!'
  same_nick_online: '&4O mesmo nome de usuário já está jogando no servidor!'
  invalid_name_case: 'Você deve entrar usando o nome de usuário %valid, não %invalid.'
  same_ip_online: 'Um jogador com o mesmo IP já está no jogo!'
  quick_command: 'Você usou um comando muito rápido! Por favor, entre no servidor novamente e espere mais antes de usar qualquer comando.'

# Email
email:
  usage_email_add: '&cUso: /email add <email> <confirmarEmail>'
  usage_email_change: '&cUso: /email change <EmailAntigo> <NovoEmail>'
  new_email_invalid: '&cNovo email inválido, tente novamente!'
  old_email_invalid: '&cEmail antigo inválido, tente novamente!'
  invalid: '&cEndereço de email inválido, tente novamente!'
  added: '&2Endereço de email adicionado com sucesso à sua conta!'
  request_confirmation: '&cPor favor, confirme seu endereço de email!'
  changed: '&2Endereço de email alterado corretamente!'
  email_show: '&2Seu endereço de email atual é: &f%email'
  incomplete_settings: 'Erro: nem todas as configurações obrigatórias estão definidas para o envio de emails. Por favor, contate um admin.'
  already_used: '&4O endereço de email já está sendo usado'
  send_failure: 'O email não pôde ser enviado. Por favor contate um administrador.'
  no_email_for_account: '&2Atualmente você não tem um endereço de email associado a esta conta.'
  add_email_request: '&3Por favor, adicione seu email à sua conta com o comando: /email add <seuEmail> <confirmarEmail>'
  change_password_expired: 'Você não pode mais alterar sua senha usando este comando.'
  email_cooldown_error: '&cUm email já foi enviado recentemente. Você deve esperar %time antes de poder enviar um novo.'
  add_not_allowed: '&cAdicionar email não foi permitido.'
  change_not_allowed: '&cAlterar email não foi permitido.'

# Password recovery by email
recovery:
  forgot_password_hint: '&3Esqueceu sua senha? Por favor use o comando: /email recovery <seuEmail>'
  command_usage: '&cUso: /email recovery <Email>'
  email_sent: '&2Email de recuperação enviado com sucesso! Por favor verifique sua caixa de entrada!'
  code:
    code_sent: 'Um código de recuperação para redefinir sua senha foi enviado para seu email.'
    incorrect: 'O código de recuperação não está correto! Você tem %count tentativas restantes.'
    tries_exceeded: 'Você excedeu o número máximo de tentativas para inserir o código de recuperação. Use "/email recovery [email]" para gerar um novo.'
    correct: 'Código de recuperação inserido corretamente!'
    change_password: 'Por favor use o comando /email setpassword <nova senha> para alterar sua senha imediatamente.'

# Captcha
captcha:
  usage_captcha: '&3Para fazer login você precisa resolver um código captcha, por favor use o comando: /captcha %captcha_code'
  wrong_captcha: '&cCaptcha incorreto, por favor digite "/captcha %captcha_code" no chat!'
  valid_captcha: '&2Código captcha resolvido corretamente!'
  captcha_for_registration: 'Para se registrar você precisa resolver um captcha primeiro, por favor use o comando: /captcha %captcha_code'
  register_captcha_valid: '&2Captcha válido! Você já pode se registrar com /register'

# Verification code
verification:
  code_required: '&3Este comando é sensível e requer uma verificação por email! Verifique sua caixa de entrada e siga as instruções do email.'
  command_usage: '&cUso: /verification <código>'
  incorrect_code: '&cCódigo incorreto, por favor digite "/verification <código>" no chat, usando o código que você recebeu por email'
  success: '&2Sua identidade foi verificada! Você agora pode executar todos os comandos dentro da sessão atual!'
  already_verified: '&2Você já pode executar todos os comandos sensíveis dentro da sessão atual!'
  code_expired: '&3Seu código expirou! Execute outro comando sensível para obter um novo código!'
  email_needed: '&3Para verificar sua identidade você precisa vincular um endereço de email à sua conta!!'

# Two-factor authentication
two_factor:
  code_created: '&2Seu código secreto é %code. Você pode escaneá-lo por aqui %url'
  confirmation_required: 'Por favor, confirme seu código com /2fa confirm <código>'
  code_required: 'Por favor, envie seu código de autenticação de dois fatores com /2fa code <código>'
  already_enabled: 'A autenticação de dois fatores já está ativada para a sua conta!'
  enable_error_no_code: 'Nenhuma chave 2fa foi gerada para você ou ela expirou. Por favor execute /2fa add'
  enable_success: 'Autenticação de dois fatores ativada com sucesso para a sua conta'
  enable_error_wrong_code: 'Código incorreto ou expirado. Por favor execute /2fa add'
  not_enabled_error: 'A autenticação de dois fatores não está ativada para a sua conta. Execute /2fa add'
  removed_success: 'Autenticação de dois fatores removida com sucesso da sua conta'
  invalid_code: 'Código inválido!'

# Time units
time:
  second: 'segundo'
  seconds: 'segundos'
  minute: 'minuto'
  minutes: 'minutos'
  hour: 'hora'
  hours: 'horas'
  day: 'dia'
  days: 'dias'